<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLCC</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    body {
      position: relative;
    }

    .center {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .logo {
      width: min(300px, 70vw);
      height: min(300px, 70vw);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .footer-canvas-wrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 30px;
      pointer-events: none;
    }

    #footerCanvas {
      display: block;
      width: 100%;
      height: 30px;
    }

    @media (max-width: 420px) {
      .footer-canvas-wrap,
      #footerCanvas {
        height: 28px;
      }
    }
  </style>
</head>

    </div>
  </div>

  <div class="footer-canvas-wrap">
    <canvas id="footerCanvas"></canvas>
  </div>

  <script>
    (function () {
      const encoded = "Ry5MLiBDYXBpdGFsICYgQ29uc3VsdGluZyBVRyB8IEzDvGNrc3RyLiAyNCB8IDEwMzE3IEJlcmxpbiB8IEdmLiBNYXJpYW4gS2xlZSB8IGNvbnRhY3RAZ2xjYy5iZXJsaW4=";

      function fitCanvasToCSS(canvas) {
        const dpr = Math.max(window.devicePixelRatio || 1, 1);
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        const ctx = canvas.getContext("2d");
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        return ctx;
      }

      function decodeBase64Unicode(str) {
        return decodeURIComponent(
          Array.prototype.map.call(atob(str), function (c) {
            return "%" + c.charCodeAt(0).toString(16).padStart(2, "0");
          }).join("")
        );
      }

      function drawFooter() {
        const canvas = document.getElementById("footerCanvas");
        const ctx = fitCanvasToCSS(canvas);
        const w = canvas.getBoundingClientRect().width;
        const h = canvas.getBoundingClientRect().height;
        const text = decodeBase64Unicode(encoded);

        ctx.clearRect(0, 0, w, h);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#b8b8b8";
        ctx.font = (window.innerWidth <= 420 ? 9 : 10) + 'px -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif';
        ctx.fillText(text, w / 2, h / 2, w - 16);
      }

      window.addEventListener("resize", drawFooter, { passive: true });
      drawFooter();
    })();
  </script>
